<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Norsk">
<meta name="theme-color" content="#f0ece0">
<link rel="manifest" href="manifest.json">
<title>Norsk — Inloggen</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css">
</head>
<body>

<div class="auth-page" id="root">
  <!-- wordt gevuld door JS -->
</div>

<script type="module">
import { signIn, signUp, getSession } from './src/auth.js'

// Al ingelogd? → direct door
const session = await getSession()
if (session) { window.location.replace('app.html'); throw new Error('redirect') }

// ── Render ────────────────────────────────────────────────
const root = document.getElementById('root')

function render(mode = 'login') {
  root.innerHTML = `
    <div class="auth-card">
      <div class="auth-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/>
          <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
        </svg>
      </div>
      <div class="auth-title">Norsk leren 🇳🇴</div>
      <div class="auth-sub">Leer Noors met flashcards & quiz</div>

      <div class="auth-tabs">
        <button class="auth-tab ${mode === 'login' ? 'active' : ''}" id="tab-login">Inloggen</button>
        <button class="auth-tab ${mode === 'signup' ? 'active' : ''}" id="tab-signup">Aanmelden</button>
      </div>

      <div class="auth-error" id="auth-error"></div>

      <div class="auth-field">
        <label>E-mailadres</label>
        <input type="email" id="email" placeholder="jij@email.com" autocomplete="email">
      </div>
      <div class="auth-field">
        <label>Wachtwoord</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="${mode === 'login' ? 'current-password' : 'new-password'}">
      </div>

      <button class="btn btn-primary btn-full btn-lg" id="submit-btn">
        ${mode === 'login' ? 'Inloggen' : 'Account aanmaken'}
      </button>
    </div>
  `

  // Tab switching
  document.getElementById('tab-login').onclick  = () => render('login')
  document.getElementById('tab-signup').onclick = () => render('signup')

  // Enter key
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('submit-btn').click()
  })

  // Submit
  document.getElementById('submit-btn').onclick = async () => {
    const email    = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value
    const btn      = document.getElementById('submit-btn')
    const errEl    = document.getElementById('auth-error')

    if (!email || !password) {
      showError('Vul alle velden in.')
      return
    }

    btn.disabled = true
    btn.textContent = 'Bezig...'
    errEl.classList.remove('show')

    try {
      if (mode === 'login') {
        await signIn(email, password)
      } else {
        await signUp(email, password)
      }
      window.location.replace('app.html')
    } catch (err) {
      btn.disabled = false
      btn.textContent = mode === 'login' ? 'Inloggen' : 'Account aanmaken'
      showError(translateError(err.message))
    }
  }
}

function showError(msg) {
  const el = document.getElementById('auth-error')
  el.textContent = msg
  el.classList.add('show')
}

function translateError(msg) {
  if (msg.includes('Invalid login')) return 'Onjuist e-mailadres of wachtwoord.'
  if (msg.includes('already registered')) return 'Dit e-mailadres is al in gebruik.'
  if (msg.includes('Password should')) return 'Wachtwoord moet minimaal 6 tekens zijn.'
  return msg
}

render('login')
</script>
</body>
</html>
